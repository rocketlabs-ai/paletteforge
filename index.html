<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaletteForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --chrome: #0a0a0a;
    --chrome-mid: #111111;
    --chrome-light: #1a1a1a;
    --border: #222222;
    --text-dim: #444444;
    --text-mid: #777777;
    --text: #aaaaaa;
    --text-bright: #dddddd;
    --accent: #ffffff;
    --radius: 3px;
    --swatch-h: calc(100vh - 56px);
    --transition: 280ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  html, body {
    height: 100%;
    background: var(--chrome);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    overflow: hidden;
  }

  /* ─── TOPBAR ─── */
  #topbar {
    height: 56px;
    background: var(--chrome);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 0;
    position: relative;
    z-index: 100;
    flex-shrink: 0;
  }

  #logo {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 17px;
    color: var(--accent);
    letter-spacing: -0.02em;
    margin-right: 24px;
    white-space: nowrap;
  }

  #logo span {
    color: var(--text-dim);
    font-weight: 400;
  }

  .sep {
    width: 1px;
    height: 20px;
    background: var(--border);
    margin: 0 16px;
    flex-shrink: 0;
  }

  #harmony-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-right: 8px;
    white-space: nowrap;
  }

  #harmony-select {
    background: var(--chrome-light);
    border: 1px solid var(--border);
    color: var(--text-bright);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    outline: none;
  }

  #harmony-select:focus { border-color: #444; }

  .top-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap;
    letter-spacing: 0.04em;
  }

  .top-btn:hover {
    border-color: #555;
    color: var(--accent);
    background: var(--chrome-light);
  }

  .top-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 500;
  }

  .top-btn.primary:hover {
    background: #dddddd;
    border-color: #dddddd;
    color: #000;
  }

  .top-btn svg { flex-shrink: 0; }

  #spacer { flex: 1; }

  /* ─── MAIN LAYOUT ─── */
  #main {
    display: flex;
    flex-direction: row;
    height: var(--swatch-h);
  }

  /* ─── SWATCHES ─── */
  .swatch {
    flex: 1;
    position: relative;
    cursor: pointer;
    transition: flex var(--transition);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 0 20px 0;
  }

  .swatch:hover { flex: 1.4; }
  .swatch.focused { flex: 1.6; outline: none; }

  .swatch-inner {
    position: absolute;
    inset: 0;
    transition: background-color var(--transition);
  }

  .swatch-controls {
    position: absolute;
    top: 16px;
    right: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    opacity: 0;
    transition: opacity var(--transition);
  }

  .swatch:hover .swatch-controls,
  .swatch.focused .swatch-controls {
    opacity: 1;
  }

  .swatch-btn {
    width: 32px;
    height: 32px;
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 160ms ease;
    flex-shrink: 0;
  }

  .swatch-btn:hover {
    background: rgba(0,0,0,0.6);
    border-color: rgba(255,255,255,0.5);
    transform: scale(1.08);
  }

  .swatch-btn.locked {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.8);
    color: white;
  }

  .swatch-info {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 14px 16px;
    background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 100%);
    display: flex;
    flex-direction: column;
    gap: 3px;
    opacity: 0;
    transition: opacity var(--transition);
  }

  .swatch:hover .swatch-info,
  .swatch.focused .swatch-info {
    opacity: 1;
  }

  .swatch-hex {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: white;
    letter-spacing: 0.06em;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }

  .swatch-hsl {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.04em;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }

  .swatch-copy-flash {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(0,0,0,0.75);
    color: white;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 8px 14px;
    border-radius: var(--radius);
    pointer-events: none;
    opacity: 0;
    transition: opacity 200ms, transform 200ms;
  }

  .swatch-copy-flash.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  /* ─── LOCK INDICATOR ─── */
  .lock-indicator {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: rgba(255,255,255,0.8);
    opacity: 0;
    transition: opacity var(--transition);
  }

  .swatch.locked .lock-indicator { opacity: 1; }

  /* ─── ADJUST PANEL ─── */
  #adjust-panel {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 420px;
    max-width: calc(100vw - 32px);
    background: var(--chrome-mid);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    padding: 20px 24px 24px;
    z-index: 200;
    transition: transform 360ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  #adjust-panel.open {
    transform: translateX(-50%) translateY(0);
  }

  #adjust-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  #adjust-title {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-mid);
  }

  #adjust-swatch-preview {
    width: 32px;
    height: 32px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    transition: background-color 80ms;
  }

  #adjust-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-mid);
    cursor: pointer;
    border-radius: var(--radius);
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 160ms;
  }

  #adjust-close:hover { border-color: #555; color: var(--accent); }

  .slider-row {
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .slider-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-mid);
    width: 20px;
    flex-shrink: 0;
  }

  .slider-track {
    flex: 1;
    position: relative;
    height: 6px;
    border-radius: 3px;
    cursor: pointer;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
    background: transparent;
    position: relative;
    z-index: 1;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--chrome);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.3);
    cursor: pointer;
    transition: transform 120ms;
  }

  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
  input[type=range]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--chrome);
    cursor: pointer;
  }

  .slider-value {
    font-size: 12px;
    color: var(--text-bright);
    width: 36px;
    text-align: right;
    flex-shrink: 0;
  }

  /* hue slider */
  #hue-slider { background: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00); }
  #sat-slider { background: linear-gradient(to right, #888, #f00); }
  #lit-slider { background: linear-gradient(to right, #000, #888, #fff); }

  /* ─── EXPORT PANEL ─── */
  #export-panel {
    position: fixed;
    top: 56px;
    right: 0;
    width: 380px;
    max-width: 100vw;
    height: calc(100vh - 56px);
    background: var(--chrome-mid);
    border-left: 1px solid var(--border);
    transform: translateX(100%);
    transition: transform 360ms cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 150;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #export-panel.open { transform: translateX(0); }

  #export-header {
    padding: 20px 20px 0;
    flex-shrink: 0;
  }

  #export-title {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-mid);
    margin-bottom: 14px;
  }

  #export-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 0;
  }

  .export-tab {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-mid);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 5px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 160ms;
  }

  .export-tab.active, .export-tab:hover {
    border-color: #555;
    color: var(--accent);
    background: var(--chrome-light);
  }

  #export-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px 20px;
  }

  #export-body::-webkit-scrollbar { width: 4px; }
  #export-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  #export-code {
    background: var(--chrome);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    font-size: 11px;
    line-height: 1.7;
    color: var(--text-bright);
    white-space: pre;
    overflow-x: auto;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.02em;
  }

  #export-copy-btn {
    margin-top: 12px;
    width: 100%;
    padding: 9px;
    background: var(--chrome-light);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 160ms;
  }

  #export-copy-btn:hover { border-color: #555; color: var(--accent); }
  #export-copy-btn.copied { border-color: #3a7a3a; color: #5dbb5d; }

  #export-close {
    position: absolute;
    top: 20px;
    right: 20px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-mid);
    cursor: pointer;
    border-radius: var(--radius);
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 160ms;
  }

  #export-close:hover { border-color: #555; color: var(--accent); }

  /* ─── CONTRAST PANEL ─── */
  #contrast-panel {
    position: fixed;
    top: 56px;
    left: 0;
    width: 320px;
    max-width: 100vw;
    height: calc(100vh - 56px);
    background: var(--chrome-mid);
    border-right: 1px solid var(--border);
    transform: translateX(-100%);
    transition: transform 360ms cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 150;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #contrast-panel.open { transform: translateX(0); }

  #contrast-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #contrast-title {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-mid);
  }

  #contrast-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-mid);
    cursor: pointer;
    border-radius: var(--radius);
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 160ms;
  }

  #contrast-close:hover { border-color: #555; color: var(--accent); }

  #contrast-body { flex: 1; overflow-y: auto; padding: 16px; }
  #contrast-body::-webkit-scrollbar { width: 4px; }
  #contrast-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .contrast-pair {
    margin-bottom: 12px;
    background: var(--chrome);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .contrast-preview {
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
  }

  .contrast-meta {
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .contrast-ratio {
    font-size: 12px;
    color: var(--text-bright);
    flex: 1;
  }

  .badge {
    font-size: 9px;
    letter-spacing: 0.1em;
    padding: 2px 6px;
    border-radius: 2px;
    font-weight: 500;
  }

  .badge.pass { background: rgba(60, 120, 60, 0.4); color: #7adb7a; border: 1px solid rgba(100,180,100,0.3); }
  .badge.warn { background: rgba(140, 100, 30, 0.4); color: #e8c060; border: 1px solid rgba(180,140,60,0.3); }
  .badge.fail { background: rgba(120, 40, 40, 0.4); color: #e07070; border: 1px solid rgba(180,80,80,0.3); }

  /* ─── COLOR BLIND TOGGLE ─── */
  #cb-panel {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--chrome-mid);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 8px;
    display: flex;
    gap: 4px;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 280ms;
  }

  #cb-panel.visible { opacity: 1; pointer-events: all; }

  .cb-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: 16px;
    color: var(--text-mid);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 160ms;
    white-space: nowrap;
  }

  .cb-btn.active {
    background: var(--chrome-light);
    border-color: #555;
    color: var(--accent);
  }

  /* ─── FOOTER ─── */
  #footer {
    position: fixed;
    bottom: 6px;
    right: 16px;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    pointer-events: none;
    z-index: 50;
  }

  /* ─── SHARE TOAST ─── */
  #share-toast {
    position: fixed;
    top: 72px;
    left: 50%;
    transform: translateX(-50%) translateY(-8px);
    background: var(--chrome-light);
    border: 1px solid var(--border);
    color: var(--text-bright);
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 10px 18px;
    border-radius: var(--radius);
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: all 240ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  #share-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─── KEYBOARD HINT ─── */
  #key-hint {
    position: fixed;
    bottom: 20px;
    right: 16px;
    display: flex;
    gap: 10px;
    z-index: 50;
    pointer-events: none;
  }

  .key-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  .key {
    background: var(--chrome-light);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px 6px;
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
  }

  /* ─── MOBILE ─── */
  @media (max-width: 600px) {
    #main { flex-direction: column; }
    .swatch { flex: none; height: calc((100vh - 56px) / 5); }
    .swatch:hover { flex: none; height: calc((100vh - 56px) / 5); }
    .swatch-info { opacity: 1; }
    .swatch-controls { opacity: 1; }
    #key-hint { display: none; }
    #export-panel { width: 100vw; }
    #contrast-panel { width: 100vw; }
    #adjust-panel { width: calc(100vw - 24px); }
    .top-btn span { display: none; }
    #logo { font-size: 14px; margin-right: 12px; }
    .sep { margin: 0 8px; }
  }

  /* ─── ANIMATIONS ─── */
  @keyframes swatchIn {
    from { opacity: 0; transform: scaleY(0.96); }
    to { opacity: 1; transform: scaleY(1); }
  }

  .swatch {
    animation: swatchIn 380ms cubic-bezier(0.4, 0, 0.2, 1) both;
  }

  .swatch:nth-child(1) { animation-delay: 0ms; }
  .swatch:nth-child(2) { animation-delay: 40ms; }
  .swatch:nth-child(3) { animation-delay: 80ms; }
  .swatch:nth-child(4) { animation-delay: 120ms; }
  .swatch:nth-child(5) { animation-delay: 160ms; }

  /* color-blind simulation via CSS filter */
  body.cb-deuteranopia #main { filter: url(#deut-filter); }
  body.cb-protanopia #main { filter: url(#prot-filter); }

  /* regenerate flash */
  .swatch-inner.flash {
    animation: flashIn 320ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes flashIn {
    0% { opacity: 0.3; }
    100% { opacity: 1; }
  }
</style>
</head>
<body>

<!-- SVG filters for color blindness simulation -->
<svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
  <defs>
    <!-- Deuteranopia (green-blind) -->
    <filter id="deut-filter" color-interpolation-filters="linearRGB">
      <feColorMatrix type="matrix" values="
        0.625 0.375 0   0 0
        0.7   0.3   0   0 0
        0     0.3   0.7 0 0
        0     0     0   1 0"/>
    </filter>
    <!-- Protanopia (red-blind) -->
    <filter id="prot-filter" color-interpolation-filters="linearRGB">
      <feColorMatrix type="matrix" values="
        0.567 0.433 0     0 0
        0.558 0.442 0     0 0
        0     0.242 0.758 0 0
        0     0     0     1 0"/>
    </filter>
  </defs>
</svg>

<!-- TOPBAR -->
<div id="topbar">
  <div id="logo">Palette<span>Forge</span></div>

  <div id="harmony-label">mode</div>
  <select id="harmony-select">
    <option value="analogous">analogous</option>
    <option value="complementary">complementary</option>
    <option value="triadic">triadic</option>
    <option value="split-complementary">split-comp</option>
    <option value="random">random</option>
  </select>

  <div class="sep"></div>

  <button class="top-btn primary" id="gen-btn" title="Generate (Space)">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
      <path d="M13.5 8A5.5 5.5 0 112.5 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M13.5 8V4.5M13.5 8H10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Generate</span>
  </button>

  <div class="sep"></div>

  <button class="top-btn" id="contrast-btn" title="Contrast checker">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
      <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/>
      <path d="M8 1.5C8 1.5 8 14.5 8 14.5" stroke="currentColor" stroke-width="1.3"/>
      <path d="M8 1.5A6.5 6.5 0 018 14.5" fill="currentColor" opacity="0.3"/>
    </svg>
    <span>Contrast</span>
  </button>

  <div class="sep"></div>

<script>
// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => {
    const k = (n + h / 30) % 12;
    const c = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
    return Math.round(255 * c).toString(16).padStart(2, '0');
  };
  return `#${f(0)}${f(8)}${f(4)}`;
}

function hexToHsl(hex) {
  let r = parseInt(hex.slice(1,3),16)/255;
  let g = parseInt(hex.slice(3,5),16)/255;
  let b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max+min)/2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h = ((g-b)/d + (g<b?6:0))/6; break;
      case g: h = ((b-r)/d + 2)/6; break;
      case b: h = ((r-g)/d + 4)/6; break;
    }
  }
  return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}

function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => {
    const k = (n + h / 30) % 12;
    return l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
  };
  return [f(0)*255, f(8)*255, f(4)*255];
}

function luminance(r, g, b) {
  const sRGB = [r, g, b].map(c => {
    c /= 255;
    return c <= 0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4);
  });
  return 0.2126*sRGB[0] + 0.7152*sRGB[1] + 0.0722*sRGB[2];
}

function contrastRatio(hsl1, hsl2) {
  const [r1,g1,b1] = hslToRgb(...hsl1);
  const [r2,g2,b2] = hslToRgb(...hsl2);
  const l1 = luminance(r1,g1,b1);
  const l2 = luminance(r2,g2,b2);
  const lighter = Math.max(l1,l2);
  const darker  = Math.min(l1,l2);
  return (lighter + 0.05) / (darker + 0.05);
}

function clamp(v, min, max) { return Math.min(max, Math.max(min, v)); }
function rand(min, max) { return min + Math.random() * (max - min); }

// ═══════════════════════════════════════════════
// PALETTE GENERATION
// ═══════════════════════════════════════════════
function generatePalette(mode) {
  const base = rand(0, 360);
  const baseSat = rand(55, 90);
  const baseLit = rand(40, 65);

  let hues;
  switch (mode) {
    case 'complementary':
      hues = [base, base+10, base+175, base+180, base+185];
      break;
    case 'triadic':
      hues = [base, base+8, base+120, base+125, base+240];
      break;
    case 'split-complementary':
      hues = [base, base+5, base+150, base+180, base+210];
      break;
    case 'random':
      hues = [rand(0,360), rand(0,360), rand(0,360), rand(0,360), rand(0,360)];
      break;
    default: // analogous
      hues = [base-20, base-8, base, base+15, base+32];
  }

  return hues.map((h, i) => {
    const hue = ((h % 360) + 360) % 360;
    const lit = mode === 'complementary' && i > 2
      ? clamp(baseLit + rand(-15, 15), 25, 80)
      : clamp(baseLit + rand(-18, 18), 25, 80);
    const sat = clamp(baseSat + rand(-15, 10), 40, 95);
    return { h: Math.round(hue), s: Math.round(sat), l: Math.round(lit), locked: false };
  });
}

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let palette = [];
let focusedIdx = -1;
let adjustIdx = -1;
let exportFmt = 'css';
let cbMode = 'none';

// ═══════════════════════════════════════════════
// URL ENCODING
// ═══════════════════════════════════════════════
function paletteToHash(p) {
  return '#' + p.map(c => `${c.h},${c.s},${c.l}`).join('-');
}

function hashToPalette(hash) {
  try {
    const parts = hash.slice(1).split('-');
    if (parts.length !== 5) return null;
    return parts.map(p => {
      const [h,s,l] = p.split(',').map(Number);
      if (isNaN(h)||isNaN(s)||isNaN(l)) return null;
      return { h: clamp(h,0,359), s: clamp(s,0,100), l: clamp(l,5,95), locked: false };
    });
  } catch { return null; }
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
const main = document.getElementById('main');

function renderSwatches() {
  main.innerHTML = '';
  palette.forEach((color, idx) => {
    const hex = hslToHex(color.h, color.s, color.l);
    const isDark = color.l < 50;

    const swatch = document.createElement('div');
    swatch.className = 'swatch' + (color.locked ? ' locked' : '');
    swatch.tabIndex = 0;
    swatch.dataset.idx = idx;

    swatch.innerHTML = `
      <div class="swatch-inner" style="background:${hex}"></div>
      <div class="lock-indicator"></div>
      <div class="swatch-controls">
        <button class="swatch-btn ${color.locked ? 'locked' : ''}" data-action="lock" title="Lock (L)">
          ${color.locked
            ? `<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="8" rx="1.5" stroke="white" stroke-width="1.4"/><path d="M5.5 7V5a2.5 2.5 0 015 0v2" stroke="white" stroke-width="1.4" stroke-linecap="round"/></svg>`
            : `<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="8" rx="1.5" stroke="white" stroke-width="1.4"/><path d="M5.5 7V5a2.5 2.5 0 015 0v2" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/></svg>`
          }
        </button>
        <button class="swatch-btn" data-action="adjust" title="Adjust">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
            <circle cx="5" cy="5" r="1.5" stroke="white" stroke-width="1.3"/>
            <circle cx="11" cy="11" r="1.5" stroke="white" stroke-width="1.3"/>
            <path d="M5 5v7M11 1v7M1 5h2.5M6.5 5H15M1 11h8M12.5 11H15" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="swatch-info">
        <div class="swatch-hex">${hex.toUpperCase()}</div>
        <div class="swatch-hsl">hsl(${color.h}, ${color.s}%, ${color.l}%)</div>
      </div>
      <div class="swatch-copy-flash">Copied!</div>
    `;

    swatch.addEventListener('click', e => {
      const action = e.target.closest('[data-action]')?.dataset.action;
      if (action === 'lock') { toggleLock(idx); return; }
      if (action === 'adjust') { openAdjust(idx); return; }
      copySwatch(idx);
    });

    swatch.addEventListener('focus', () => { focusedIdx = idx; });
    swatch.addEventListener('blur',  () => { if (focusedIdx === idx) focusedIdx = -1; });
    swatch.addEventListener('dblclick', () => openAdjust(idx));

    main.appendChild(swatch);
  });
}

function flashSwatch(idx) {
  const inner = main.children[idx]?.querySelector('.swatch-inner');
  if (!inner) return;
  inner.classList.remove('flash');
  void inner.offsetWidth;
  inner.classList.add('flash');
  inner.addEventListener('animationend', () => inner.classList.remove('flash'), { once: true });
}

function updateSwatchColors(animated) {
  palette.forEach((color, idx) => {
    const swatch = main.children[idx];
    if (!swatch) return;
    const hex = hslToHex(color.h, color.s, color.l);
    swatch.querySelector('.swatch-inner').style.background = hex;
    swatch.querySelector('.swatch-hex').textContent = hex.toUpperCase();
    swatch.querySelector('.swatch-hsl').textContent = `hsl(${color.h}, ${color.s}%, ${color.l}%)`;
    if (animated && !color.locked) flashSwatch(idx);
  });
}

// ═══════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════
function generate() {
  const mode = document.getElementById('harmony-select').value;
  const fresh = generatePalette(mode);
  palette = palette.map((c, i) => c.locked ? c : fresh[i]);
  history.replaceState(null, '', paletteToHash(palette));
  updateSwatchColors(true);
  if (document.getElementById('export-panel').classList.contains('open')) renderExport();
  if (document.getElementById('contrast-panel').classList.contains('open')) renderContrast();
}

function toggleLock(idx) {
  palette[idx].locked = !palette[idx].locked;
  renderSwatches();
}

function copySwatch(idx) {
  const hex = hslToHex(palette[idx].h, palette[idx].s, palette[idx].l);
  navigator.clipboard.writeText(hex).catch(() => {});
  const flash = main.children[idx]?.querySelector('.swatch-copy-flash');
  if (!flash) return;
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 1000);
}

// ═══════════════════════════════════════════════
// ADJUST
// ═══════════════════════════════════════════════
const adjustPanel = document.getElementById('adjust-panel');
const hueInput = document.getElementById('hue-input');
const satInput = document.getElementById('sat-input');
const litInput = document.getElementById('lit-input');
const hueVal = document.getElementById('hue-val');
const satVal = document.getElementById('sat-val');
const litVal = document.getElementById('lit-val');
const adjPreview = document.getElementById('adjust-swatch-preview');
const adjHexDisplay = document.getElementById('adjust-hex-display');

function openAdjust(idx) {
  adjustIdx = idx;
  const c = palette[idx];
  hueInput.value = c.h;
  satInput.value = c.s;
  litInput.value = c.l;
  hueVal.textContent = c.h;
  satVal.textContent = c.s + '%';
  litVal.textContent = c.l + '%';
  updateSliderBgs();
  updateAdjPreview();
  adjustPanel.classList.add('open');
}

function closeAdjust() {
  adjustPanel.classList.remove('open');
  adjustIdx = -1;
}

function updateAdjPreview() {
  if (adjustIdx < 0) return;
  const h = +hueInput.value, s = +satInput.value, l = +litInput.value;
  const hex = hslToHex(h, s, l);
  adjPreview.style.background = hex;
  adjHexDisplay.textContent = hex.toUpperCase();
}

function updateSliderBgs() {
  const h = +hueInput.value, s = +satInput.value, l = +litInput.value;

  // Hue slider — rainbow
  const hueCanvas = document.getElementById('hue-slider');
  drawGradient(hueCanvas, Array.from({length:13}, (_,i) => hslToHex(i*30, s, l)));

  // Sat slider
  const satCanvas = document.getElementById('sat-canvas');
  drawGradient(satCanvas, [hslToHex(h, 0, l), hslToHex(h, 100, l)]);

  // Lit slider
  const litCanvas = document.getElementById('lit-canvas');
  drawGradient(litCanvas, [hslToHex(h, s, 5), hslToHex(h, s, 50), hslToHex(h, s, 95)]);
}

function drawGradient(canvas, stops) {
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
  const grad = ctx.createLinearGradient(0, 0, canvas.width, 0);
  stops.forEach((c, i) => grad.addColorStop(i / (stops.length - 1), c));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

[hueInput, satInput, litInput].forEach(inp => {
  inp.addEventListener('input', () => {
    if (adjustIdx < 0) return;
    const h = +hueInput.value, s = +satInput.value, l = +litInput.value;
    palette[adjustIdx] = { ...palette[adjustIdx], h, s, l };
    hueVal.textContent = h;
    satVal.textContent = s + '%';
    litVal.textContent = l + '%';
    updateSliderBgs();
    updateAdjPreview();
    updateSwatchColors(false);
    history.replaceState(null, '', paletteToHash(palette));
    if (document.getElementById('contrast-panel').classList.contains('open')) renderContrast();
  });
});

document.getElementById('adjust-close').addEventListener('click', closeAdjust);

// ═══════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════
function paletteToExport(fmt) {
  const colors = palette.map((c, i) => ({
    name: `color-${i+1}`,
    hex: hslToHex(c.h, c.s, c.l).toUpperCase(),
    hsl: `hsl(${c.h}, ${c.s}%, ${c.l}%)`
  }));

  if (fmt === 'css') {
    return `:root {\n${colors.map(c => `  --${c.name}: ${c.hex};`).join('\n')}\n}`;
  }
  if (fmt === 'tailwind') {
    const inner = colors.map(c => `      '${c.name}': '${c.hex}',`).join('\n');
    return `module.exports = {\n  theme: {\n    extend: {\n      colors: {\n${inner}\n      },\n    },\n  },\n};`;
  }
  if (fmt === 'scss') {
    return colors.map(c => `$${c.name}: ${c.hex};`).join('\n');
  }
  if (fmt === 'json') {
    const obj = {};
    colors.forEach(c => { obj[c.name] = { hex: c.hex, hsl: c.hsl }; });
    return JSON.stringify(obj, null, 2);
  }
}

function renderExport() {
  document.getElementById('export-code').textContent = paletteToExport(exportFmt);
}

document.getElementById('export-btn').addEventListener('click', () => {
  const ep = document.getElementById('export-panel');
  const isOpen = ep.classList.contains('open');
  ep.classList.toggle('open', !isOpen);
  if (!isOpen) renderExport();
});

document.getElementById('export-close').addEventListener('click', () => {
  document.getElementById('export-panel').classList.remove('open');
});

document.querySelectorAll('.export-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.export-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    exportFmt = tab.dataset.fmt;
    renderExport();
  });
});

const exportCopyBtn = document.getElementById('export-copy-btn');
exportCopyBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(paletteToExport(exportFmt)).catch(() => {});
  exportCopyBtn.textContent = 'Copied!';
  exportCopyBtn.classList.add('copied');
  setTimeout(() => {
    exportCopyBtn.textContent = 'Copy to Clipboard';
    exportCopyBtn.classList.remove('copied');
  }, 1500);
});

// ═══════════════════════════════════════════════
// CONTRAST
// ═══════════════════════════════════════════════
function renderContrast() {
  const body = document.getElementById('contrast-body');
  body.innerHTML = '';

  const pairs = [];
  for (let i = 0; i < 5; i++) {
    for (let j = i+1; j < 5; j++) {
      pairs.push([i, j]);
    }
  }

  pairs.forEach(([a, b]) => {
    const ca = palette[a], cb = palette[b];
    const ha = [ca.h, ca.s, ca.l], hb = [cb.h, cb.s, cb.l];
    const ratio = contrastRatio(ha, hb);
    const hexA = hslToHex(ca.h, ca.s, ca.l);
    const hexB = hslToHex(cb.h, cb.s, cb.l);

    let aaLarge = ratio >= 3.0 ? 'pass' : ratio >= 2.5 ? 'warn' : 'fail';
    let aa = ratio >= 4.5 ? 'pass' : ratio >= 3.5 ? 'warn' : 'fail';
    let aaa = ratio >= 7.0 ? 'pass' : ratio >= 5.5 ? 'warn' : 'fail';

    const el = document.createElement('div');
    el.className = 'contrast-pair';
    el.innerHTML = `
      <div class="contrast-preview" style="background:${hexA};color:${hexB}">
        Aa — Sample Text
      </div>
      <div class="contrast-meta">
        <span class="contrast-ratio">${ratio.toFixed(2)}:1</span>
        <span class="badge ${aaLarge}">AA-lg</span>
        <span class="badge ${aa}">AA</span>
        <span class="badge ${aaa}">AAA</span>
      </div>
    `;
    body.appendChild(el);
  });
}

document.getElementById('contrast-btn').addEventListener('click', () => {
  const cp = document.getElementById('contrast-panel');
  const isOpen = cp.classList.contains('open');
  cp.classList.toggle('open', !isOpen);
  if (!isOpen) renderContrast();
});

document.getElementById('contrast-close').addEventListener('click', () => {
  document.getElementById('contrast-panel').classList.remove('open');
});

// ═══════════════════════════════════════════════
// COLOR BLINDNESS
// ═══════════════════════════════════════════════
const cbPanel = document.getElementById('cb-panel');

document.getElementById('cb-toggle-btn').addEventListener('click', () => {
  cbPanel.classList.toggle('visible');
});

document.querySelectorAll('.cb-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cb-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    cbMode = btn.dataset.mode;
    document.body.classList.remove('cb-deuteranopia', 'cb-protanopia');
    if (cbMode === 'deuteranopia') document.body.classList.add('cb-deuteranopia');
    if (cbMode === 'protanopia') document.body.classList.add('cb-protanopia');
  });
});

// ═══════════════════════════════════════════════
// SHARE
// ═══════════════════════════════════════════════
document.getElementById('share-btn').addEventListener('click', () => {
  const url = location.href.split('#')[0] + paletteToHash(palette);
  navigator.clipboard.writeText(url).catch(() => {});
  const toast = document.getElementById('share-toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
});

// ═══════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

  if (e.code === 'Space') {
    e.preventDefault();
    generate();
    return;
  }

  if (e.code === 'KeyL') {
    if (focusedIdx >= 0) toggleLock(focusedIdx);
    return;
  }

  if (e.code === 'KeyC') {
    if (focusedIdx >= 0) copySwatch(focusedIdx);
    return;
  }

  if (e.code === 'Escape') {
    closeAdjust();
    document.getElementById('export-panel').classList.remove('open');
    document.getElementById('contrast-panel').classList.remove('open');
    cbPanel.classList.remove('visible');
  }
});

// ═══════════════════════════════════════════════
// GEN BUTTON
// ═══════════════════════════════════════════════
document.getElementById('gen-btn').addEventListener('click', generate);

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function init() {
  const hash = location.hash;
  const fromHash = hash ? hashToPalette(hash) : null;

  if (fromHash && fromHash.every(Boolean)) {
    palette = fromHash;
  } else {
    palette = generatePalette('analogous');
    history.replaceState(null, '', paletteToHash(palette));
  }

  renderSwatches();
}

init();
</script>
</body>
</html>
